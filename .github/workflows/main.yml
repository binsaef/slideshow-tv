name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/releases/download/v8.4.0/gradle-8.4-bin.zip" -o gradle.zip
          unzip -p gradle.zip "gradle-8.4/lib/gradle-launcher-8.4.jar" > /dev/null || true
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || \
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true
          ls -lh gradle/wrapper/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SlideshowTV-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
